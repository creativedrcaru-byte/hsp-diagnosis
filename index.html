<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스트레스 진단</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page-shell">
    <section class="intro" aria-labelledby="page-title">
      <p class="eyebrow">자가 점검</p>
      <h1 id="page-title">스트레스 진단</h1>
      <div class="intro-copy">
        <p>다음 20개 항목은 스트레스가 쌓이면 흔히 나타나는 증상들입니다.</p>
        <p>제시된 항목 중에서 내게 해당되는 것이 몇 개나 되는지 체크해보세요.</p>
      </div>
      <p class="notice">
        이 진단은 의학적 진단이 아니라 현재 상태를 돌아보기 위한 참고용 자가 점검입니다.
        심한 불안, 우울감, 자해 생각, 일상생활의 어려움이 지속된다면 전문가의 도움을 받으시기 바랍니다.
      </p>
    </section>

    <form id="stress-form" class="questions" novalidate>
      <div id="question-list" class="question-list"></div>
      <p id="form-message" class="form-message" role="alert" aria-live="polite"></p>
      <button class="primary-button" type="submit">결과 보기</button>
    </form>

    <section id="result" class="result" aria-live="polite" hidden>
      <p class="result-label">당신의 스트레스 점수는</p>
      <div class="score"><span id="score-value">0</span>점 <small>/ 20점</small></div>
      <div id="result-card" class="result-card">
        <h2 id="result-title"></h2>
        <p id="result-description"></p>
      </div>
      <button id="reset-button" class="secondary-button" type="button">다시 진단하기</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
